version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - durationcheck
    - errchkjson
    - errorlint
    - copyloopvar
    - dupword
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - nilerr
    - nolintlint
    - revive
    - unconvert
    - unparam
    - whitespace
    - errname
    - intrange
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - nilness
        - shadow
    nakedret:
      max-func-lines: 30
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
          - gocyclo
          - dupword
          - goconst
          - unparam

formatters:
  enable:
    - goimports
